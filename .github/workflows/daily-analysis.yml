name: Daily Market Intelligence

on:
  schedule:
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-${{ hashFiles('requirements.txt') }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - name: Run analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONPATH: src
        run: python src/main.py

      - name: Commit report
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "feat: market intelligence report $(date -u '+%Y-%m-%d')" &&
            git push
          )
