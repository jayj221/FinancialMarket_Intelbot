name: Daily Market Intelligence

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 2:00 PM UTC, Monday–Friday
  workflow_dispatch:          # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download VADER lexicon
        run: python -c "import nltk; nltk.download('vader_lexicon')"

      - name: Run market intelligence analysis
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PYTHONPATH: src
        run: python src/main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "feat: market intelligence report $(date -u '+%Y-%m-%d')" &&
            git push
          )
